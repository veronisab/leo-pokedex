<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leo og Ellas pokedex</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e3350d;
    --dark: #1a1a2e;
    --card: #16213e;
    --panel: #0f3460;
    --text: #eef2ff;
    --muted: #8892b0;
    --border: #1e3a5f;
    --shine: rgba(255,255,255,0.06);
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, #1e3a5f33 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #e3350d11 0%, transparent 60%);
  }

  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 2px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,52,96,0.5);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-logo {
    font-size: 2rem;
    color: var(--red);
    text-shadow: 2px 2px 0 #7a1a08;
  }
  .header-sub { font-size: 12px; color: var(--muted); font-weight: 600; }

  .pokeball-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--red) 50%, white 50%);
    border: 3px solid #fff;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px var(--red);
  }
  .pokeball-icon::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    background: white;
    border-radius: 50%;
    border: 2px solid #333;
  }

  .search-bar {
    padding: 16px 32px;
    background: rgba(22,33,62,0.8);
    border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    width: 100%; max-width: 400px;
    padding: 10px 18px;
    border-radius: 30px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 14px; font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--red); }
  .search-bar input::placeholder { color: var(--muted); }

  .table-container { padding: 24px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    text-align: left;
    padding: 10px 14px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  tbody tr:hover { background: var(--shine); }
  tbody td { padding: 10px 14px; vertical-align: middle; }

  .img-cell img {
    width: 70px; height: 70px;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: transform 0.2s;
  }
  tbody tr:hover .img-cell img { transform: scale(1.15); }
  .name-cell { font-weight: 800; font-size: 15px; text-transform: capitalize; }

  .detail-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,20,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .detail-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 460px; width: 100%;
    overflow: hidden;
    animation: slideUp 0.25s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .detail-hero {
    position: relative;
    padding: 40px 20px 20px;
    display: flex; flex-direction: column; align-items: center;
    background: linear-gradient(135deg, var(--panel) 0%, var(--dark) 100%);
  }
  .detail-hero::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .detail-num {  font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .detail-img {
    width: 160px; height: 160px;
    image-rendering: pixelated;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
    position: relative; z-index: 1;
  }
  .detail-name {
    font-size: 16px; text-transform: capitalize;
    margin-top: 14px; text-align: center;
  }
  .detail-types { margin-top: 10px; display: flex; gap: 6px; justify-content: center; }

  .detail-body { padding: 24px; }
  .detail-section-title {
    font-size: 8px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 14px;
  }

  .stat-row { display: flex; align-items: center; margin-bottom: 10px; gap: 12px; }
  .stat-name { width: 90px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: capitalize; flex-shrink: 0; }
  .stat-val { width: 32px; font-size: 13px; font-weight: 800; text-align: right; flex-shrink: 0; }
  .stat-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

  .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .info-box { background: var(--panel); border-radius: 10px; padding: 12px 16px; }
  .info-box-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .info-box-val { font-size: 16px; font-weight: 800; }

  .close-btn {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.1);
    border: none; color: var(--text);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; z-index: 2;
  }
  .close-btn:hover { background: var(--red); }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 60vh;
    font-size: 10px; color: var(--muted); gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .abilities-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .ability-tag {
    background: var(--panel);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 700; text-transform: capitalize;
  }

  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 48px; height: 48px;
    border-radius: 50%;
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    z-index: 101;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .nav-btn:hover { background: var(--red); border-color: var(--red); transform: translateY(-50%) scale(1.1); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
  .nav-btn.prev { left: calc(50% - 270px); }
  .nav-btn.next { right: calc(50% - 270px); }
  @media (max-width: 600px) {
    .nav-btn.prev { left: 8px; }
    .nav-btn.next { right: 8px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const TYPE_COLORS = {
  fire:'#fd7d24', water:'#4592c4', grass:'#9bcc50', electric:'#eed535',
  psychic:'#f366b9', ice:'#51c4e7', dragon:'#6a6fc9', dark:'#707070',
  fe:'#fdb9e9', normal:'#a4acaf', fighting:'#d56723', flying:'#3dc7ef',
  gift:'#b97fc9', ground:'#f7de3f', rock:'#a38c21', bug:'#729f3f',
  ghost:'#7b62a3', steel:'#9eb7b8'
};
const LIGHT_TYPES = ['grass','electric','ice','fairy','normal','flying','ground','steel'];

const STAT_COLORS = {
  hp:'#ff5959', attack:'#f5ac78', defense:'#fae078',
  'special-attack':'#9db7f5', 'special-defense':'#a7db8d', speed:'#fa92b2'
};
const STAT_LABELS = {
  hp:'HP', attack:'ATK', defense:'DEF',
  'special-attack':'SP.ATK', 'special-defense':'SP.DEF', speed:'SPD'
};

function TypeBadge({ type }) {
  return (
    <span className="type-badge" style={{
      background: TYPE_COLORS[type] || '#888',
      color: LIGHT_TYPES.includes(type) ? '#1a1a2e' : 'white'
    }}>
      {type}
    </span>
  );
}

function StatBar({ name, value }) {
  const pct = Math.min(100, (value / 255) * 100);
  return (
    <div className="stat-row">
      <span className="stat-name">{STAT_LABELS[name] || name}</span>
      <span className="stat-val">{value}</span>
      <div className="stat-bar-bg">
        <div className="stat-bar-fill" style={{ width: `${pct}%`, background: STAT_COLORS[name] || '#ccc' }} />
      </div>
    </div>
  );
}

function DetailView({ pokemon, onClose, onPrev, onNext }) {
  const [detail, setDetail] = useState(null);

  useEffect(() => {
    setDetail(null);
    fetch(`https://pokeapi.co/api/v2/pokemon/${pokemon.id}`)
      .then(r => r.json())
      .then(setDetail);
  }, [pokemon.id]);

  useEffect(() => {
    function handleKey(e) {
      if (e.key === 'ArrowLeft' && onPrev) onPrev();
      if (e.key === 'ArrowRight' && onNext) onNext();
      if (e.key === 'Escape') onClose();
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [onPrev, onNext, onClose]);

  const img = detail
    ? (detail.sprites.other['official-artwork']?.front_default || detail.sprites.front_default)
    : null;

  return (
    <div className="detail-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <button className="nav-btn prev" onClick={onPrev} disabled={!onPrev}>&#8592;</button>
      <button className="nav-btn next" onClick={onNext} disabled={!onNext}>&#8594;</button>
      <div className="detail-card">
        <div className="detail-hero">
          <button className="close-btn" onClick={onClose}>×</button>
          <div className="detail-num">#{String(pokemon.id).padStart(3, '0')}</div>
          {img
            ? <img className="detail-img" src={img} alt={pokemon.name} />
            : <div style={{width:160,height:160,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>
          }
          <div className="detail-name">{pokemon.name}</div>
          <div className="detail-types">
            {detail && detail.types.map(t => <TypeBadge key={t.type.name} type={t.type.name} />)}
          </div>
        </div>

        {detail ? (
          <div className="detail-body">
            <div className="detail-info-grid">
              <div className="info-box">
                <div className="info-box-label">Height</div>
                <div className="info-box-val">{(detail.height / 10).toFixed(1)} m</div>
              </div>
              <div className="info-box">
                <div className="info-box-label">Weight</div>
                <div className="info-box-val">{(detail.weight / 10).toFixed(1)} kg</div>
              </div>
            </div>
            <div className="detail-section-title">Abilities</div>
            <div className="abilities-list">
              {detail.abilities.map(a => (
                <span key={a.ability.name} className="ability-tag">
                  {a.ability.name}{a.is_hidden ? ' ✦' : ''}
                </span>
              ))}
            </div>
            <div className="detail-section-title">Base Stats</div>
            {detail.stats.map(s => <StatBar key={s.stat.name} name={s.stat.name} value={s.base_stat} />)}
          </div>
        ) : (
          <div style={{padding:'30px',textAlign:'center',color:'var(--muted)',fontSize:13}}>Loading stats...</div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [pokemon, setPokemon] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');

  useEffect(() => {
    async function load() {
      const list = await Promise.all(
        Array.from({ length: 151 }, (_, i) => i + 1).map(async id => {
          const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
          const d = await res.json();
          return {
            id,
            name: d.name,
            sprite: d.sprites.front_default,
            types: d.types.map(t => t.type.name),
          };
        })
      );
      setPokemon(list);
      setLoading(false);
    }
    load();
  }, []);

  const filtered = pokemon.filter(p =>
    p.name.includes(search.toLowerCase()) || String(p.id).includes(search)
  );

  if (loading) return (
    <div className="loading">
      <div className="spinner" />
      Laster Pokédex...
    </div>
  );

  return (
    <>
      <div className="header">
        <div className="pokeball-icon" />
        <div>
          <div className="header-logo">Leo og Ellas Pokédex</div>
          <div className="header-sub">Original 151</div>
        </div>
      </div>

      <div className="search-bar">
        <input
          type="text"
          placeholder="Søk"
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
      </div>

      <div className="table-container">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th></th>
              <th>Navn</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(p => (
              <tr key={p.id} onClick={() => setSelected(p)}>
                <td className="num-cell">#{String(p.id).padStart(3, '0')}</td>
                <td className="img-cell"><img src={p.sprite} alt={p.name} /></td>
                <td className="name-cell">{p.name.toUpperCase()}</td>
                <td>{p.types.map(t => <TypeBadge key={t} type={t} />)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {selected && (
        <DetailView
          pokemon={selected}
          onClose={() => setSelected(null)}
          onPrev={selected.id > 1 ? () => setSelected(pokemon.find(p => p.id === selected.id - 1)) : null}
          onNext={selected.id < 151 ? () => setSelected(pokemon.find(p => p.id === selected.id + 1)) : null}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
